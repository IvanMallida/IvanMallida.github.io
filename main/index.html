<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo: Sistema Solar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0B0C2D;
            --text-light: #F5F5F5;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
        }
        .planet {
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            font-family: 'Nunito', sans-serif;
        }
        /* Estilos específicos para planetas */
        .mercury { background: linear-gradient(135deg, #B7B7B7, #898989); width: 30px; height: 30px; }
        .venus { background: linear-gradient(135deg, #FAD6A5, #D4A15D); width: 45px; height: 45px; }
        .earth { background: linear-gradient(135deg, #6B93D6, #4172B3); width: 50px; height: 50px; }
        .mars { background: linear-gradient(135deg, #D97C52, #AD4A25); width: 40px; height: 40px; }
        .jupiter { background: linear-gradient(135deg, #E0C5A3, #B89B7E); width: 100px; height: 100px; font-size: 1rem; }
        .saturn { background: linear-gradient(135deg, #F0E5C4, #D6C39A); width: 90px; height: 90px; font-size: 1rem; position: relative; }
        .saturn::after { content: ''; position: absolute; width: 150%; height: 8px; background: rgba(240, 229, 196, 0.7); border-radius: 50%; transform: rotate(-20deg); }
        .uranus { background: linear-gradient(135deg, #AEE5D8, #87CBB9); width: 70px; height: 70px; }
        .neptune { background: linear-gradient(135deg, #5D8AA8, #3B6B8A); width: 65px; height: 65px; }
    </style>
</head>
<body>
    <header class="flex justify-between items-center p-4">
        <div class="w-40 h-10 flex items-center justify-center bg-gray-700/50 rounded-lg">
            <p class="text-sm">LOGO CLIENTE</p>
        </div>
        <h2 class="text-2xl md:text-3xl text-center">Elige un planeta para explorar</h2>
    </header>
    <main class="flex-grow flex flex-col md:flex-row items-center gap-8 p-4">
        <!-- Columna de Instrucciones -->
        <aside class="w-full md:w-1/4 h-full bg-black/30 rounded-2xl p-6 flex flex-col items-center text-center gap-4">
             <div class="w-24 h-24 rounded-full bg-gradient-to-br from-gray-400 to-gray-600 flex items-center justify-center shadow-lg">
                <div class="w-12 h-12 bg-cyan-300 rounded-full flex items-center justify-center text-3xl">👁️</div>
            </div>
            <h3 class="text-xl font-bold">¡Hola, explorador!</h3>
            <p class="text-sm">Soy Cometa, tu guía. Haz clic en cualquier planeta para aprender sus secretos. ¡Completa las misiones para ganar insignias!</p>
        </aside>
        <!-- Sistema Solar Interactivo -->
        <div class="w-full md:w-3/4 h-full flex items-center justify-center relative gap-4 md:gap-8">
            <div class="w-32 h-32 md:w-48 md:h-48 rounded-full bg-gradient-to-br from-yellow-400 to-orange-600 shadow-2xl shadow-yellow-500/50 flex items-center justify-center text-3xl font-bold">SOL</div>
            <div class="planet mercury" title="Mercurio"></div>
            <div class="planet venus" title="Venus"></div>
            <div class="planet earth" title="Tierra"></div>
            <div class="planet mars" title="Marte"></div>
            <div class="planet jupiter" title="Júpiter"></div>
            <div class="planet saturn" title="Saturno"></div>
            <div class="planet uranus" title="Urano"></div>
            <div class="planet neptune" title="Neptuno"></div>
        </div>
    </main>
</body>
</html>
