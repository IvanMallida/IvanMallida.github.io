<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo: Pantalla de Inicio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0B0C2D;
            --accent-orange: #FF6B00;
            --text-light: #F5F5F5;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
        }
        .main-button {
            background-color: var(--accent-orange);
            color: var(--text-light);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <header class="flex justify-start p-6">
        <div class="w-48 h-12 flex items-center justify-center bg-gray-700/50 rounded-lg">
            <p class="text-sm">LOGO CLIENTE</p>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center text-center gap-8 px-4">
        <h1 class="text-5xl md:text-7xl font-black" style="color: var(--text-light);">Viaje Interplanetario</h1>
        <!-- Personaje Guía "Cometa" -->
        <div class="w-32 h-32 rounded-full bg-gradient-to-br from-gray-400 to-gray-600 flex items-center justify-center shadow-lg">
            <div class="w-16 h-16 bg-cyan-300 rounded-full flex items-center justify-center text-4xl">👁️</div>
        </div>
        <button class="main-button">Iniciar Aventura</button>
    </main>
</body>
</html>
