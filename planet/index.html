<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prototipo: Detalle de Planeta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #0B0C2D;
            --accent-cyan: #00C2D1;
            --text-light: #F5F5F5;
        }
        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-sizing: border-box;
        }
        h1, h2, h3 {
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
        }
        .main-button {
            background-color: var(--accent-cyan);
            color: var(--text-light);
            padding: 0.75rem 2rem;
            border-radius: 9999px;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .planet {
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            font-family: 'Nunito', sans-serif;
        }
        .earth { background: linear-gradient(135deg, #6B93D6, #4172B3); }
    </style>
</head>
<body>
    <header class="flex justify-between items-center p-4">
        <div class="w-40 h-10 flex items-center justify-center bg-gray-700/50 rounded-lg">
            <p class="text-sm">LOGO CLIENTE</p>
        </div>
        <h2 class="text-2xl md:text-4xl">La Tierra</h2>
        <button class="main-button">Volver al Mapa</button>
    </header>
    <main class="flex-grow flex flex-col md:flex-row items-stretch gap-8 p-4">
        <!-- Imagen del Planeta -->
        <div class="w-full md:w-1/3 flex items-center justify-center">
            <div class="w-64 h-64 md:w-96 md:h-96 planet earth"></div>
        </div>
        <!-- Información y Pestañas -->
        <div class="w-full md:w-2/3 bg-black/30 rounded-2xl p-6">
            <div class="flex border-b border-gray-500 mb-4">
                <button class="py-2 px-4 text-lg font-bold border-b-4 border-cyan-400">Ficha Técnica</button>
                <button class="py-2 px-4 text-lg text-gray-400">Galería</button>
                <button class="py-2 px-4 text-lg text-gray-400">Misión</button>
            </div>
            <div class="content-panel">
                <h3 class="text-2xl mb-2">Datos Curiosos</h3>
                <p class="text-base" style="max-width: 65ch;">
                    Aquí se mostraría la información clave del planeta seleccionado. Por ejemplo, su diámetro, distancia al sol, y un dato divertido para mantener el interés del niño. El texto se limita a un ancho de línea óptimo para la lectura.
                </p>
            </div>
        </div>
    </main>
</body>
</html>
